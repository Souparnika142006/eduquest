# ── Server ──
server.port=8080

# ── PostgreSQL Database ──
spring.datasource.url=jdbc:postgresql://localhost:5432/eduquest_db
spring.datasource.username=eduquest_user
spring.datasource.password=your_secure_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Redis ──
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.cache.type=redis

# ── JWT ──
app.jwt.secret=EduQuestSIHProjectSecretKey2024SuperSecureBase64EncodedKey==
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ── Anthropic Claude API ──
anthropic.api.key=your_anthropic_api_key_here
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.model=claude-sonnet-4-20250514
anthropic.api.max-tokens=1000

# ── CORS ──
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── File Upload ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ──
logging.level.com.eduquest=INFO
logging.level.org.springframework.security=WARN

# ── OpenAPI ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
